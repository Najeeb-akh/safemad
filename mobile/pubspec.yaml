name: safemad
description: AI-Powered Emergency Shelter Finder for Israeli Homes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  http_parser: ^4.0.2
  mime: ^1.0.4
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.8.1
  flutter_svg: ^2.0.7
  intl: ^0.20.2
  camera: ^0.10.5+5
  path: ^1.8.3
  permission_handler: ^11.0.1
  url_launcher: ^6.2.2
  auto_size_text: ^3.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
